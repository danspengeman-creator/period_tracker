// ── MOON PHASE ──
function getMoonPhase(date) {
  const ref = new Date(2000, 0, 6);
  const diff = (date - ref) / 86400000;
  const cycle = 29.53058867;
  const age = ((diff % cycle) + cycle) % cycle;
  let emoji, name, spiritual, science;
  if      (age < 1.85)  { emoji="🌑"; name="New Moon";         spiritual="A time of new beginnings and inward reflection. Set intentions and rest.";                                                    science="Some research suggests melatonin shifts around new moons may subtly influence sleep and hormonal rhythms."; }
  else if (age < 7.38)  { emoji="🌒"; name="Waxing Crescent";  spiritual="Energy is quietly building. Small actions and hopeful intentions carry extra weight.";                                         science="As moonlight gradually increases, your body may feel a gentle pull toward more activity and outward energy."; }
  else if (age < 9.22)  { emoji="🌓"; name="First Quarter";    spiritual="A moment of decision and momentum. Push through resistance and take action.";                                                  science="The half-lit moon marks the lunar cycle midpoint — many women report increased energy and drive around this phase."; }
  else if (age < 14.77) { emoji="🌔"; name="Waxing Gibbous";   spiritual="Refinement and patience. You are almost at your peak — trust the process.";                                                   science="Rising moonlight intensity may correlate with heightened alertness and social energy in the days before full moon."; }
  else if (age < 16.61) { emoji="🌕"; name="Full Moon";        spiritual="Peak illumination and emotional intensity. Feelings are heightened, energy is at its fullest.";                                science="Studies have noted changes in sleep architecture and mood intensity around full moons, possibly linked to light exposure affecting melatonin."; }

  return { emoji, name, age, spiritual, science };
}

// ── UTILITIES ──
function parseISOLocal(str) {
  if (!str) return null;
  const s = String(str).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
  const MON={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
  const match=s.match(/^(\w+)\s+(\d{1,2}),?\s+(\d{4})$/);
  if (match && MON[match[1]]!==undefined) return new Date(parseInt(match[3]),MON[match[1]],parseInt(match[2]));
  return null;
}
function toISO(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function avgCycleLen(dates) {
  if (dates.length<2) return 28;
  const gaps=[];
  for (let i=1;i<dates.length;i++) { const diff=(parseISOLocal(dates[i])-parseISOLocal(dates[i-1]))/86400000; if(diff>14&&diff<50) gaps.push(diff); }
  if (!gaps.length) return 28;
  return Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length);
}
function getPhase(dayInCycle,cycleLen) { const pct=dayInCycle/cycleLen; return PHASES.find(p=>pct<=p.maxPct)||PHASES[PHASES.length-1]; }
function getDayTip(phase) { return phase.tips[Math.floor(Date.now()/86400000)%phase.tips.length]; }

// ── FETCH / WRITE ──
async function fetchData() {
  try {
    const res=await fetch(SCRIPT_URL+'?action=read&t='+Date.now());
    const json=await res.json();
    const normSymptom = (json.symptomDates||[]).map(d => { const p=parseISOLocal(d); return p?toISO(p):null; }).filter(Boolean);
    const feelingsMap = {};
    if (json.feelingsMap) Object.assign(feelingsMap, json.feelingsMap);
    const normSex = (json.sexDates||[]).map(d => { const p=parseISOLocal(d); return p?toISO(p):null; }).filter(Boolean);
    return { periodDates:(json.periodDates||[]).sort(), signalDates:(json.signalDates||[]).sort(), symptomDates:normSymptom.sort(), feelingsMap, sexDates:normSex.sort() };
  } catch(e) { return { periodDates:[...PERIOD_DATES_FB].sort(), signalDates:[...SIGNAL_DATES_FB].sort(), symptomDates:[], feelingsMap:{}, sexDates:[...SEX_DATES_FB].sort() }; }
}
async function writeEntry(action,dateStr) {
  const res=await fetch(SCRIPT_URL+'?action='+action+'&date='+encodeURIComponent(dateStr)+'&t='+Date.now());
  const json=await res.json();
  if (!json.ok) throw new Error(json.error||'Write failed');
  return json;
}

  const today=new Date();
  const dt=new Date(today.getFullYear(),today.getMonth()+offset,1);
  const month=dt.getMonth(), year=dt.getFullYear();
  const firstDow=dt.getDay(), daysInMonth=new Date(year,month+1,0).getDate();
  const todayISO=toISO(today);
  const lastPeriod=parseISOLocal(periodDates[periodDates.length-1]);
  const signalSet=new Set(signalDates);
  const symptomSet=new Set(symptomDates);
  const sexSet=new Set(sexDates||[]);
  const FEELING_PRIORITY = ['Horny','Affectionate','Bloated','Cramping','Emotional','Tired','Happy'];
  function getSymptomEmoji(iso) {
    const raw = feelingsMap && feelingsMap[iso];
    if (!raw) return '📝';
    const logged = raw.split(',').map(s => s.trim());
    for (const f of FEELING_PRIORITY) {
      if (logged.includes(f)) {
        const match = [{emoji:'🔥',label:'Horny'},{emoji:'🥰',label:'Affectionate'},{emoji:'🫠',label:'Bloated'},{emoji:'🤕',label:'Cramping'},{emoji:'😢',label:'Emotional'},{emoji:'😴',label:'Tired'},{emoji:'😊',label:'Happy'}].find(x=>x.label===f);
        if (match) return match.emoji;
      }
    }
    return '📝';
  }

  function getDayClass(iso) {
    const d=parseISOLocal(iso);
    const daysSinceLast=Math.floor((d-lastPeriod)/86400000);
    if (daysSinceLast<0) { for (const pd of periodDates) { const p=parseISOLocal(pd); const diff=Math.floor((d-p)/86400000); if(diff>=0&&diff<=4) return 'period'; } return 'follicular'; }
    const cycleDay=(daysSinceLast%len)+1;
    const ovulationDay=Math.round(len*PHASES[2].maxPct);
    if (cycleDay<=5) return 'period';
    if (cycleDay>=ovulationDay-2&&cycleDay<=ovulationDay) return 'ovulation'; // 3-day ovulation window
    if (cycleDay>=ovulationDay-5&&cycleDay<ovulationDay-2) return 'fertile';
    const pct=cycleDay/len;
    if (pct<=PHASES[1].maxPct) return 'follicular';
    if (pct<=PHASES[3].maxPct) return 'luteal';
    return 'pms';
  }

  let h='<div class="cal-nav"><button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>'
        +'<div style="text-align:center"><span class="cal-month">'+MONTHS[month]+' '+year+'</span>'
        +(offset>0?'<div style="font-size:11px;color:var(--ink-lt);margin-top:2px;font-style:italic">Estimated cycle based on data</div>':'')
        +'</div><button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button></div>'
        +'<div class="cal-grid">'+DOWS.map(d=>'<div class="cal-dow">'+d+'</div>').join('');
  for (let i=0;i<firstDow;i++) h+='<div class="cal-day empty"></div>';
  for (let day=1;day<=daysInMonth;day++) {
    const iso=year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const pc=getDayClass(iso), it=iso===todayISO?' today':'', sg=signalSet.has(iso)?' signal':'', sy=symptomSet.has(iso)?' symptom':'';
    const symEmoji=symptomSet.has(iso)?'<span style="font-size:8px;position:absolute;top:1px;left:2px;line-height:1">'+getSymptomEmoji(iso)+'</span>':'';
    const sexEmoji=sexSet.has(iso)?'<span style="font-size:8px;position:absolute;bottom:1px;left:2px;line-height:1">😏</span>':'';
    h+='<div class="cal-day'+(pc?' '+pc:'')+it+sg+sy+'" onclick="tapDay(\''+iso+'\')">'+day+symEmoji+sexEmoji+'</div>';
  }
  h+='</div><div class="cal-legend">'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'period\')"     style="background:#E8D4EE;color:#7B4F8E">🌙 Period</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'follicular\')" style="background:#EEF3F8;color:#7A99B8">🌸 Follicular</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'fertile\')"    style="background:#FDEAE0;color:#D4845A">🌿 Fertile</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'ovulation\')"  style="background:var(--rose-lt);color:#C45E8A">✨ Ovulation</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'luteal\')"     style="background:var(--sage-lt);color:#5FA67A">🍂 Luteal</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'pms\')"        style="background:var(--blue-lt);color:#5B8DB8">🌧 PMS</span>'
    +'</div>';
  return h;
}

// ── PREVIOUS FEELINGS FOR PHASE ──
function getPreviousFeelings(phaseName, feelingsMap, periodDates, len) {
  if (!feelingsMap || !Object.keys(feelingsMap).length) return '';

  // Map phase name to cycle day range
  const phaseRanges = {
    'Menstrual':   [1, Math.round(len * 0.18)],
    'Follicular':  [Math.round(len * 0.18) + 1, Math.round(len * 0.46)],
    'Ovulation':   [Math.round(len * 0.46) + 1, Math.round(len * 0.57)],
    'Luteal':      [Math.round(len * 0.57) + 1, Math.round(len * 0.86)],
    'Late Luteal': [Math.round(len * 0.86) + 1, len]
  };
  const range = phaseRanges[phaseName];
  if (!range) return '';

  // Count feeling frequency for this phase across all logged entries
  const counts = {};
  const lastDate = parseISOLocal(periodDates[periodDates.length - 1]);

  for (const [dateStr, feelings] of Object.entries(feelingsMap)) {
    const d = parseISOLocal(dateStr);
    if (!d) continue;
    const daysSince = Math.floor((d - lastDate) / 86400000);
    const cycleDay = ((daysSince % len) + len) % len + 1;
    if (cycleDay >= range[0] && cycleDay <= range[1]) {
      feelings.split(',').map(f => f.trim()).filter(Boolean).forEach(f => {
        counts[f] = (counts[f] || 0) + 1;
      });
    }
  }

  if (!Object.keys(counts).length) return '';

  // Get top 3 most reported feelings
  const top = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([f]) => f);

  const FEELING_EMOJIS = {
    'Happy':'😊','Energized':'⚡','Calm':'😌','Affectionate':'🥰','Horny':'🔥',
    'Neutral':'😐','Tired':'😴','Foggy / Low focus':'🧠','Stressed':'😮‍💨',
    'Emotional':'😢','Irritable':'😠','Cramping':'🤕','Bloated':'🫠',
    'Headachey':'🤯','Breast Tenderness':'🎀','Nauseous':'🤢'
  };

  const formatted = top.map(f => (FEELING_EMOJIS[f] || '') + ' ' + f).join(', ');

  return '<div style="margin-top:0.85rem;padding:0.75rem 1rem;background:var(--mist);border-radius:12px;border:1px solid var(--border)">'
    + '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-lt);margin-bottom:4px">You&#39;ve previously reported</div>'
    + '<div style="font-size:13px;color:var(--ink-mid);line-height:1.5">' + formatted + ' during this phase.</div>'
    + '</div>';
}


// ── CYCLE IRREGULARITY DETECTION ──
function getCycleIrregularity(periodDates) {
  if (periodDates.length < 4) return null; // need at least 3 cycles

  const lengths = [];
  for (let i = 1; i < periodDates.length; i++) {
    const diff = Math.floor((parseISOLocal(periodDates[i]) - parseISOLocal(periodDates[i-1])) / 86400000);
    if (diff > 14 && diff < 60) lengths.push(diff);
  }
  if (lengths.length < 3) return null;

  const avg = lengths.reduce((a,b) => a+b, 0) / lengths.length;
  const variance = lengths.reduce((sum, l) => sum + Math.pow(l - avg, 2), 0) / lengths.length;
  const stdDev = Math.sqrt(variance);
  const hasShort = lengths.some(l => l < 21);
  const hasLong  = lengths.some(l => l > 35);
  const isIrregular = stdDev > 7 || hasShort || hasLong;

  if (!isIrregular) return null;

  const reasons = [];
  if (hasShort) reasons.push('one or more cycles shorter than 21 days');
  if (hasLong)  reasons.push('one or more cycles longer than 35 days');
  if (stdDev > 7) reasons.push('high variation between cycles (' + Math.round(stdDev) + ' day standard deviation)');

  return { stdDev: Math.round(stdDev), hasShort, hasLong, reasons };
}

function tapDay(iso) {
  const d = parseISOLocal(iso);
  const dateStr = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  const { periodDates, signalDates, symptomDates, len } = appState;

  // Work out phase for this day
  const lastDate = parseISOLocal(periodDates[periodDates.length-1]);
  const daysSince = Math.floor((d - lastDate) / 86400000);
  const cycleDay = (((daysSince % len) + len) % len) + 1;
  const phase = getPhase(cycleDay, len);

  const hasSignal  = signalDates.includes(iso);
  const hasSymptom = symptomDates.includes(iso);
  const isToday    = iso === toISO(new Date());
  const isFuture   = d > new Date();

  let body = '';

  // Phase summary
  body += '<div style="background:' + phase.bg + ';border-radius:12px;padding:0.85rem 1rem;margin-bottom:10px">'
    + '<div style="font-size:13px;color:' + phase.color + ';line-height:1.5">' + phase.body + '</div></div>';

  // Signal indicator
  if (hasSignal) {
    body += '<div style="background:#F0E8F8;border-radius:12px;padding:0.75rem 1rem;margin-bottom:10px;font-size:13px;color:var(--plum)">💜 Signal sent to Dan on this day.</div>';
  }

  // Symptom indicator — feelings pulled from sheet via appState.feelingsMap
  if (hasSymptom) {
    const feelings = (appState.feelingsMap && appState.feelingsMap[iso]) || '';
    body += '<div style="background:#EEF8F3;border-radius:12px;padding:0.75rem 1rem;margin-bottom:10px;font-size:13px;color:var(--sage)">'
      + '📝 Feelings logged' + (feelings ? ': <strong>' + feelings + '</strong>' : '') + '</div>';
  }

  // Actions
  body += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">';
  if (!isFuture) {
    body += '<button class="mbtn primary" onclick="closeModal();openLogForDate(\'' + iso + '\')">🩸 Log period start on this day</button>';
    body += '<button class="mbtn" onclick="closeModal();openSymptomForDate(\'' + iso + '\')" style="background:linear-gradient(135deg,#5FA67A,#3d8a5e);color:#fff">📝 Log feelings for this day</button>';
  }
  body += '<button class="mbtn cancel" onclick="closeModal()">Close</button>';
  body += '</div>';

  showModal(dateStr, phase.emoji + ' Day ' + cycleDay + ' of ' + len + ' — ' + phase.name, body);
}
function openLog() {
  const today = new Date();
  const days = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
    const iso = toISO(d);
    const label = i === 0 ? 'Today' : i === 1 ? 'Yesterday' :
      d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
    days.push({ iso, label });

  showModal('Log period start', 'When did it start?',

function openSymptom(isoOverride) {
  const iso = isoOverride || toISO(new Date());
  let selected = new Set();

  function renderFeelings() {
    document.getElementById('modal-btns').innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
      + FEELINGS.map(f => {
          const sel = selected.has(f.label);
          return '<button onclick="toggleFeeling(\''+f.label+'\')" style="'
            +'padding:14px 8px;border-radius:14px;border:'+(sel?'2px solid var(--plum)':'1px solid var(--border)')
            +';background:'+(sel?'#F0E6F7':'var(--mist)')
            +';color:'+(sel?'var(--plum)':'var(--ink-mid)')
            +';font-family:\'DM Sans\',sans-serif;font-size:18px;font-weight:'+(sel?'600':'400')
            +';cursor:pointer;text-align:center;transition:all 0.1s;">'
            +f.emoji+'<br><span style="font-size:13px">'+f.label+'</span></button>';
        }).join('')
      + '</div>'
      + '<button class="mbtn primary" onclick="submitSymptom(\''+iso+'\')" '+(selected.size===0?'style="opacity:0.4;pointer-events:none"':'')
      +'>📝 Save '+(selected.size>0?selected.size+' feeling'+(selected.size>1?'s':''):'feelings')+'</button>'
      + '<button class="mbtn cancel" onclick="closeModal()" style="margin-top:6px">Cancel</button>';
  }

  window.toggleFeeling = function(label) {
    if (selected.has(label)) selected.delete(label); else selected.add(label);
    renderFeelings();
  };
  window.submitSymptom = async function(iso) {
    const feelings = Array.from(selected).join(', ');
    const btns=document.getElementById('modal-btns');
    if(btns){btns.style.opacity='0.5';btns.style.pointerEvents='none';}
    modalMsg('Saving...');
    try {
      await writeEntry('symptom', iso+'|'+encodeURIComponent(feelings));
      const wantsSignal = selected.has('Affectionate') || selected.has('Horny');
      if (wantsSignal) {
        // Refresh data silently in background without closing modal
        fetchData().then(({periodDates,signalDates,symptomDates,feelingsMap})=>{
          appState={...appState,periodDates,signalDates,symptomDates,feelingsMap:feelingsMap||{}};
        });
        modalMsg('Feelings logged! 📝', 'ok');
        const btnsEl = document.getElementById('modal-btns');
        if (btnsEl) {
          btnsEl.style.opacity='1'; btnsEl.style.pointerEvents='auto';
          btnsEl.innerHTML =
            '<div style="background:#F5F0FF;border-radius:12px;padding:0.85rem 1rem;margin-bottom:10px;font-size:14px;color:var(--plum);line-height:1.5">'
            + '💜 Want to let Dan know tonight works?'
            + '</div>'
            + '<button class="mbtn primary" onclick="closeModal();openSignal()">💜 Yes, send Dan a signal</button>'
            + '<button class="mbtn cancel" onclick="closeModal();init()">No thanks</button>';
        }
      } else {
        modalMsg('Logged! How you feel matters.','ok');
        setTimeout(()=>{ closeModal(); init(); }, 1500);
      }
    } catch(e) {
      modalMsg('Could not save. Try again.','err');
      if(btns){btns.style.opacity='1';btns.style.pointerEvents='auto';}
    }
  };

  showModal('How are you feeling?', 'Select all that apply.', '');
  renderFeelings();
}

function playSignalChime() {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99,1046.50].forEach((freq,i)=>{
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.12);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.12);
      gain.gain.linearRampToValueAtTime(0.18,ctx.currentTime+i*0.12+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.35);
      osc.start(ctx.currentTime+i*0.12);
      osc.stop(ctx.currentTime+i*0.12+0.35);
    });
  } catch(e) {}
}


// ── PUSH NOTIFICATIONS ──

async function scheduleOverdueReminders(daysOverdue) {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;

  const reg = await navigator.serviceWorker.ready;
  if (!reg.active) return;

  // Only schedule once per overdue day
  const key = 'overdueScheduled';
  const lastKey = localStorage.getItem(key);
  const thisKey = 'overdue-' + daysOverdue;
  if (lastKey === thisKey) return;
  localStorage.setItem(key, thisKey);

  // Schedule 8am reminders for each remaining day up to 7 days overdue
  const reminders = [];
  const now = new Date();
  for (let d = daysOverdue; d <= 7; d++) {
    const daysFromNow = d - daysOverdue;
    const fire = new Date(now.getFullYear(), now.getMonth(), now.getDate() + daysFromNow, 8, 0, 0, 0);
    if (fire.getTime() > Date.now()) {
      reminders.push({ fireAt: fire.getTime(), daysOverdue: d });
    }
  }
  if (reminders.length) {
    reg.active.postMessage({ type: 'SCHEDULE_OVERDUE_REMINDERS', reminders });
  }
}
async function registerServiceWorker() {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
  try {
    await navigator.serviceWorker.register('./sw.js');
    // Request notification permission on first visit
    if (Notification.permission === 'default') {
      await Notification.requestPermission();
    }
  } catch(e) { console.warn('SW registration failed:', e); }
}

async function schedulePeriodReminders(daysUntil) {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;

  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
  if (Notification.permission !== 'granted') return;

  const reg = await navigator.serviceWorker.ready;
  if (!reg.active) return;

  // Only schedule once — store the period start date we scheduled for
  const scheduleKey = 'remindersScheduled';
  const lastKey = localStorage.getItem(scheduleKey);
  const thisKey = String(daysUntil); // unique per countdown position
  if (lastKey === thisKey) return;
  localStorage.setItem(scheduleKey, thisKey);

  // Build one 8am notification for each remaining day
  // daysUntil=3 means today is 3 days out, so schedule day 3, 2, 1 and 0
  const reminders = [];
  const now = new Date();

  for (let d = daysUntil; d >= 0; d--) {
    const daysFromNow = daysUntil - d;
    const fire = new Date(now.getFullYear(), now.getMonth(), now.getDate() + daysFromNow, 8, 0, 0, 0);
    // Skip if already past 8am today for d===daysUntil
    if (fire.getTime() > Date.now()) {
      reminders.push({ fireAt: fire.getTime(), daysUntil: d });
    }
  }

  if (reminders.length) {
    reg.active.postMessage({ type: 'SCHEDULE_PERIOD_REMINDERS', reminders });
  }
}
