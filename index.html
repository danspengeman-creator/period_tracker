  .header {

    padding: 2.5rem 1.5rem 3.5rem;

    overflow: hidden;
  }
  .header::before {
    content: '';

    inset: 0;
    background: linear-gradient(160deg, #9B5FA0 0%, #E8678A 100%);

    z-index: 0;
  }
  .header::after {

    line-height: 1.2;

    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

// ── UTILITIES ──
function parseISOLocal(str) {
  if (!str) return null;
  const s = String(str).trim();
  // YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [y,m,d] = s.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  // "Month D, YYYY" or "Month DD, YYYY" (raw sheet format)
  const MON = { January:0, February:1, March:2, April:3, May:4, June:5,
                July:6, August:7, September:8, October:9, November:10, December:11 };
  const match = s.match(/^(\w+)\s+(\d{1,2}),?\s+(\d{4})$/);
  if (match && MON[match[1]] !== undefined) {
    return new Date(parseInt(match[3]), MON[match[1]], parseInt(match[2]));
  }
  return null;
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function avgCycleLen(dates) {
  if (dates.length < 2) return 28;
  const gaps = [];
  for (let i = 1; i < dates.length; i++) {
    const diff = (parseISOLocal(dates[i]) - parseISOLocal(dates[i-1])) / 86400000;
    if (diff > 14 && diff < 50) gaps.push(diff);
  }
  if (!gaps.length) return 28;
  return Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length);
}

function getPhase(dayInCycle, cycleLen) {
  const pct = dayInCycle / cycleLen;
  return PHASES.find(p => pct <= p.maxPct) || PHASES[PHASES.length-1];
}

function getDayTip(phase) {
  const tips = phase.tips;
  const idx = Math.floor(Date.now() / 86400000) % tips.length;
  return tips[idx];
}

  } else if (age < 22.15) {
    emoji = '🌖'; name = 'Waning Gibbous';
    energy = { spiritual: 'A time of gratitude and releasing what no longer serves you. Share your gifts.', science: 'As light begins to wane, the body may start shifting toward more restorative, inward rhythms.' };
  } else if (age < 23.99) {
    emoji = '🌗'; name = 'Last Quarter';
    energy = { spiritual: 'Release, forgiveness and letting go. Clear space for what's coming.', science: 'The waning half-moon phase is associated with declining external energy and a natural draw toward rest and reflection.' };
  } else {
    emoji = '🌘'; name = 'Waning Crescent';
    energy = { spiritual: 'Surrender and rest. The cycle is completing — honor your need for quiet and stillness.', science: 'Moonlight is at its dimmest. Research suggests melatonin production may be less disrupted, supporting deeper sleep and restoration.' };
  }

  return { emoji, name, age, energy };
}

function getMoonCycleType(moonAge, cycleDay, cycleLen) {
  // White Moon: period aligns with new moon (traditionally associated with nurturing energy)
  // Red Moon: period aligns with full moon (traditionally associated with creative/outward energy)
  const onPeriod = cycleDay <= 5;
  if (!onPeriod) return null;
  if (moonAge < 3 || moonAge > 26.5) return { type: 'White Moon', desc: 'Your period aligns with the new moon — known as the White Moon cycle. Traditionally this reflects a nurturing, inward and fertile energy attuned to the earth's rhythms.' };
  if (moonAge > 12.5 && moonAge < 17.5) return { type: 'Red Moon', desc: 'Your period aligns with the full moon — known as the Red Moon cycle. Traditionally associated with outward, creative and magnetic energy, often linked to healers and wisdom keepers.' };
  return null;
}

// ── FETCH ──
async function fetchData() {
  try {
    const url = `${SCRIPT_URL}?action=read&t=${Date.now()}`;
    const res = await fetch(url);
    const json = await res.json();
    return {
      periodDates: (json.periodDates || []).sort(),
      signalDates: (json.signalDates || []).sort()
    };
  } catch(e) {
    console.warn("Using fallback data:", e);
    return {
      periodDates: [...PERIOD_DATES_FB].sort(),
      signalDates: [...SIGNAL_DATES_FB].sort()
    };
  }
}

// ── WRITE ──
async function writeEntry(action, dateStr) {
  const url = `${SCRIPT_URL}?action=${action}&date=${dateStr}&t=${Date.now()}`;
  const res = await fetch(url);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "Write failed");
  return json;
}

let calOffset = 0;
let appState = null;

// ── CALENDAR ──
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOWS = ["Su","Mo","Tu","We","Th","Fr","Sa"];

function buildCalendar(periodDates, signalDates, len, offset) {
  const today = new Date();
  const dt = new Date(today.getFullYear(), today.getMonth() + offset, 1);
  const month = dt.getMonth();
  const year = dt.getFullYear();
  const firstDow = dt.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayISO = toISO(today);

  // Build period & phase map
  const lastPeriod = parseISOLocal(periodDates[periodDates.length-1]);
  const signalSet = new Set(signalDates);

  function getDayClass(iso) {
    const d = parseISOLocal(iso);
    const daysSinceLast = Math.floor((d - lastPeriod) / 86400000);
    if (daysSinceLast < 0) {
      // Check if it was a period day for a historical period
      for (const pd of periodDates) {
        const p = parseISOLocal(pd);
        const diff = Math.floor((d - p) / 86400000);
        if (diff >= 0 && diff <= 4) return 'period';
      }
      return '';
    }
    const cycleDay = (daysSinceLast % len) + 1;
    const ovulationDay = Math.round(len * PHASES[2].maxPct);
    if (cycleDay <= 5) return 'period';
    if (cycleDay === ovulationDay) return 'ovulation';
    if (cycleDay >= ovulationDay - 4 && cycleDay < ovulationDay) return 'fertile';
    const pct = cycleDay / len;
    if (pct <= PHASES[1].maxPct) return 'follicular';
    if (pct <= PHASES[3].maxPct) return 'luteal';
    return 'pms';
  }

  let html = `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div style="text-align:center">
        <span class="cal-month">${MONTHS[month]} ${year}</span>
        ${offset > 0 ? '<div style="font-size:11px;color:var(--ink-lt);margin-top:2px;font-style:italic">Estimated cycle based on data</div>' : ''}
      </div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
  `;

  for (let i = 0; i < firstDow; i++) html += `<div class="cal-day empty"></div>`;

  for (let day = 1; day <= daysInMonth; day++) {
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const phaseClass = getDayClass(iso);
    const isToday = iso === todayISO ? ' today' : '';
    const hasSignal = signalSet.has(iso) ? ' signal' : '';
    html += `<div class="cal-day${phaseClass?' '+phaseClass:''}${isToday}${hasSignal}" onclick="tapDay('${iso}')">${day}</div>`;
  }

  html += `</div>
    <div class="cal-legend">
      <span class="leg-chip" onclick="openPhaseInfo('period')" style="background:#E8D4EE;color:#7B4F8E">🌙 Period</span>
      <span class="leg-chip" onclick="openPhaseInfo('follicular')" style="background:#EEF3F8;color:#7A99B8">🌸 Follicular</span>
      <span class="leg-chip" onclick="openPhaseInfo('ovulation')" style="background:var(--rose-lt);color:#C45E8A">✨ Ovulation</span>
      <span class="leg-chip" onclick="openPhaseInfo('fertile')" style="background:#FDEAE0;color:#D4845A">🌿 Fertile</span>
      <span class="leg-chip" onclick="openPhaseInfo('luteal')" style="background:var(--sage-lt);color:#5FA67A">🍂 Luteal</span>
      <span class="leg-chip" onclick="openPhaseInfo('pms')" style="background:var(--blue-lt);color:#5B8DB8">🌧 PMS</span>
    </div>`;
  return html;
}

function changeMonth(dir) {
  calOffset += dir;
  const { periodDates, signalDates, len } = appState;
  document.getElementById('calContainer').innerHTML = buildCalendar(periodDates, signalDates, len, calOffset);
}

// ── RENDER ──
function render(periodDates, signalDates) {
  const today = new Date();
  const todayISO = toISO(today);
  const len = avgCycleLen(periodDates);
  const last = periodDates[periodDates.length-1];
  const lastDate = parseISOLocal(last);
  const rawDaysSince = Math.floor((today - lastDate) / 86400000);

  const phase = getPhase(dayInCycle, len);
  const tip = getDayTip(phase);

  const nextPeriodDay = len - rawDaysSince % len;
  const nextPeriodDate = new Date(today.getTime() + nextPeriodDay * 86400000);
  const nextPeriodStr = nextPeriodDate.toLocaleDateString('en-US', { month:'short', day:'numeric' });

  // Ovulation window (~14 days before next period)
  const ovDay = len - 14;

  // Save state for calendar

  ${moonCycle ? '<div style="background:#F5F0FF;border-radius:10px;padding:0.75rem;margin-top:0.5rem"><div style="font-size:12px;font-weight:600;color:var(--plum);margin-bottom:4px">🌀 ' + moonCycle.type + '</div><div style="font-size:13px;color:var(--ink-mid);line-height:1.5">' + moonCycle.desc + '</div></div>' : ''}TYPE html>
