function getMoonCycleType(moonAge, cycleDay) {

// ── UTILITIES ──
function parseISOLocal(str) {
  if (!str) return null;
  const s = String(str).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
  const MON={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
  const match=s.match(/^(\w+)\s+(\d{1,2}),?\s+(\d{4})$/);
  if (match && MON[match[1]]!==undefined) return new Date(parseInt(match[3]),MON[match[1]],parseInt(match[2]));
  return null;
}
function toISO(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function avgCycleLen(dates) {
  if (dates.length<2) return 28;
  const gaps=[];
  for (let i=1;i<dates.length;i++) { const diff=(parseISOLocal(dates[i])-parseISOLocal(dates[i-1]))/86400000; if(diff>14&&diff<50) gaps.push(diff); }
  if (!gaps.length) return 28;
  return Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length);
}
function getPhase(dayInCycle,cycleLen) { const pct=dayInCycle/cycleLen; return PHASES.find(p=>pct<=p.maxPct)||PHASES[PHASES.length-1]; }
function getDayTip(phase) { return phase.tips[Math.floor(Date.now()/86400000)%phase.tips.length]; }

async function fetchData() {
  try {
    const res=await fetch(SCRIPT_URL+'?action=read&t='+Date.now());
    const json=await res.json();
    const normSymptom = (json.symptomDates||[]).map(d => { const p=parseISOLocal(d); return p?toISO(p):null; }).filter(Boolean);
    const feelingsMap = {};
    if (json.feelingsMap) Object.assign(feelingsMap, json.feelingsMap);
    const normSex = (json.sexDates||[]).map(d => { const p=parseISOLocal(d); return p?toISO(p):null; }).filter(Boolean);
    const normPeriodEnd = (json.periodEndDates||[]).map(d => { const p=parseISOLocal(d); return p?toISO(p):null; }).filter(Boolean);
    return { periodDates:(json.periodDates||[]).sort(), signalDates:(json.signalDates||[]).sort(), symptomDates:normSymptom.sort(), feelingsMap, sexDates:normSex.sort(), periodEndDates:normPeriodEnd.sort() };
  } catch(e) { return { periodDates:[...PERIOD_DATES_FB].sort(), signalDates:[...SIGNAL_DATES_FB].sort(), symptomDates:[], feelingsMap:{}, sexDates:[...SEX_DATES_FB].sort(), periodEndDates:[] }; }
}
async function writeEntry(action,dateStr) {
  const res=await fetch(SCRIPT_URL+'?action='+action+'&date='+encodeURIComponent(dateStr)+'&t='+Date.now());
  const json=await res.json();
  if (!json.ok) throw new Error(json.error||'Write failed');
  return json;
}

let calOffset=0, appState=null;
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOWS=["Su","Mo","Tu","We","Th","Fr","Sa"];

function buildCalendar(periodDates,signalDates,symptomDates,feelingsMap,sexDates,periodEndDates,len,offset) {
  const today=new Date();
  const dt=new Date(today.getFullYear(),today.getMonth()+offset,1);
  const month=dt.getMonth(), year=dt.getFullYear();
  const firstDow=dt.getDay(), daysInMonth=new Date(year,month+1,0).getDate();
  const todayISO=toISO(today);
  const lastPeriod=parseISOLocal(periodDates[periodDates.length-1]);
  const signalSet=new Set(signalDates);
  const symptomSet=new Set(symptomDates);
  const sexSet=new Set(sexDates||[]);
  const periodEndSet=new Set(periodEndDates||[]);
  const FEELING_PRIORITY = ['Horny','Affectionate','Bloated','Cramping','Emotional','Tired','Happy'];
  function getSymptomEmoji(iso) {
    const raw = feelingsMap && feelingsMap[iso];
    if (!raw) return '📝';
    const logged = raw.split(',').map(s => s.trim());
    for (const f of FEELING_PRIORITY) {
      if (logged.includes(f)) {
        const match = [{emoji:'🔥',label:'Horny'},{emoji:'🥰',label:'Affectionate'},{emoji:'🫠',label:'Bloated'},{emoji:'🤕',label:'Cramping'},{emoji:'😢',label:'Emotional'},{emoji:'😴',label:'Tired'},{emoji:'😊',label:'Happy'}].find(x=>x.label===f);
        if (match) return match.emoji;
      }
    }
    return '📝';
  }

  // Compute cycle anchor: start of current projected cycle
  const todayForCap = new Date(); todayForCap.setHours(0,0,0,0);
  const rawDaysToday = Math.floor((todayForCap - lastPeriod) / 86400000);
  const cyclesElapsed = Math.floor(rawDaysToday / len);
  // Anchor is the start of the current projected cycle (capped — no wrap until period logged)
  const cycleAnchor = new Date(lastPeriod.getTime() + cyclesElapsed * len * 86400000);

  function getDayClass(iso) {
    const d = parseISOLocal(iso);
    const ovulationDay = Math.round(len * PHASES[2].maxPct);

    // Historical dates before last period: check against all logged periods
    const daysSinceLastPeriod = Math.floor((d - lastPeriod) / 86400000);
    if (daysSinceLastPeriod < 0) {
      for (let pi = 0; pi < periodDates.length; pi++) {
        const p = parseISOLocal(periodDates[pi]);
        const diff = Math.floor((d - p) / 86400000);
        // Use logged end date if available, else assume 5 days
        const endDate = periodEndDates && periodEndDates[pi] ? parseISOLocal(periodEndDates[pi]) : null;
        const maxDiff = endDate ? Math.floor((endDate - p) / 86400000) : 4;
        if (diff >= 0 && diff <= maxDiff) return 'period';
      }
      // For days between periods, calculate cycle day from nearest prior period
      let nearestPrior = null;
      for (const pd of periodDates) {
        const p = parseISOLocal(pd);
        if (p <= d && (!nearestPrior || p > nearestPrior)) nearestPrior = p;
      }
      if (nearestPrior) {
        const ds = Math.floor((d - nearestPrior) / 86400000);
        const cd = (ds % len) + 1;
        if (cd <= 5) return 'period';
        if (cd >= ovulationDay - 2 && cd <= ovulationDay) return 'ovulation';
        if (cd >= ovulationDay - 5 && cd < ovulationDay - 2) return 'fertile';
        const pct = cd / len;
        if (pct <= PHASES[1].maxPct) return 'follicular';
        if (pct <= PHASES[3].maxPct) return 'luteal';
        return 'pms';
      }
      return 'follicular';
    }

    // For today and past since last period: use cycle anchor logic
    // For future: project using modulo from cycle anchor
    let cycD;
    if (d < cycleAnchor) {
      // Between last period and cycle anchor: use raw days since last period
      cycD = Math.min(daysSinceLastPeriod + 1, len);
    } else {
      // From cycle anchor onward: project forward using modulo
      const daysSinceAnchor = Math.floor((d - cycleAnchor) / 86400000);
      cycD = (daysSinceAnchor % len) + 1;
    }

    // Use logged end date for current cycle if available
    const lastEndISO = periodEndDates && periodEndDates.length ? periodEndDates[periodEndDates.length-1] : null;
    const lastEndDate = lastEndISO ? parseISOLocal(lastEndISO) : null;
    const periodEndDay = lastEndDate ? Math.floor((lastEndDate - lastPeriod) / 86400000) + 1 : 5;
    if (cycD >= 1 && cycD <= periodEndDay) return 'period';
    if (cycD >= ovulationDay - 2 && cycD <= ovulationDay) return 'ovulation';
    if (cycD >= ovulationDay - 5 && cycD < ovulationDay - 2) return 'fertile';
    const pct = cycD / len;
    if (pct <= PHASES[1].maxPct) return 'follicular';
    if (pct <= PHASES[3].maxPct) return 'luteal';
    return 'pms';
  }


  let h='<div class="cal-nav"><button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>'
        +'<div style="text-align:center"><span class="cal-month">'+MONTHS[month]+' '+year+'</span>'
        +(offset>0?'<div style="font-size:11px;color:var(--ink-lt);margin-top:2px;font-style:italic">Estimated cycle based on data</div>':'')
        +'</div><button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button></div>'
        +'<div class="cal-grid">'+DOWS.map(d=>'<div class="cal-dow">'+d+'</div>').join('');
  for (let i=0;i<firstDow;i++) h+='<div class="cal-day empty"></div>';
  for (let day=1;day<=daysInMonth;day++) {
    const iso=year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const pc=getDayClass(iso), it=iso===todayISO?' today':'', sg=signalSet.has(iso)?' signal':'', sy=symptomSet.has(iso)?' symptom':'';
    const symEmoji=symptomSet.has(iso)?'<span style="font-size:11px;position:absolute;top:3px;left:3px;line-height:1">'+getSymptomEmoji(iso)+'</span>':'';
    const sexEmoji=sexSet.has(iso)?'<span style="font-size:11px;position:absolute;bottom:3px;left:3px;line-height:1">😏</span>':'';
    h+='<div class="cal-day'+(pc?' '+pc:'')+it+sg+sy+'" onclick="tapDay(\''+iso+'\')">'+day+symEmoji+sexEmoji+'</div>';
  }
  h+='</div><div class="cal-legend">'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'period\')"     style="background:#E8D4EE;color:#7B4F8E">🌙 Period</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'follicular\')" style="background:#EEF3F8;color:#7A99B8">🌸 Follicular</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'fertile\')"    style="background:#FDEAE0;color:#D4845A">🌿 Fertile</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'ovulation\')"  style="background:var(--rose-lt);color:#C45E8A">✨ Ovulation</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'luteal\')"     style="background:var(--sage-lt);color:#5FA67A">🍂 Luteal</span>'
    +'<span class="leg-chip" onclick="openPhaseInfo(\'pms\')"        style="background:var(--blue-lt);color:#5B8DB8">🌧 PMS</span>'
    +'</div>';
  return h;
}

// ── PREVIOUS FEELINGS FOR PHASE ──
function getPreviousFeelings(phaseName, feelingsMap, periodDates, len) {
  if (!feelingsMap || !Object.keys(feelingsMap).length) return '';

  // Map phase name to cycle day range
  const phaseRanges = {
    'Menstrual':   [1, Math.round(len * 0.18)],
    'Follicular':  [Math.round(len * 0.18) + 1, Math.round(len * 0.46)],
    'Ovulation':   [Math.round(len * 0.46) + 1, Math.round(len * 0.57)],
    'Luteal':      [Math.round(len * 0.57) + 1, Math.round(len * 0.86)],
    'Late Luteal': [Math.round(len * 0.86) + 1, len]
  };
  const range = phaseRanges[phaseName];
  if (!range) return '';

  // Count feeling frequency for this phase across all logged entries
  const counts = {};
  const lastDate = parseISOLocal(periodDates[periodDates.length - 1]);

  for (const [dateStr, feelings] of Object.entries(feelingsMap)) {
    const d = parseISOLocal(dateStr);
    if (!d) continue;
    const daysSince = Math.floor((d - lastDate) / 86400000);
    const cycleDay = ((daysSince % len) + len) % len + 1;
    if (cycleDay >= range[0] && cycleDay <= range[1]) {
      feelings.split(',').map(f => f.trim()).filter(Boolean).forEach(f => {
        counts[f] = (counts[f] || 0) + 1;
      });
    }
  }

  if (!Object.keys(counts).length) return '';

  // Get top 3 most reported feelings
  const top = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([f]) => f);

  const FEELING_EMOJIS = {
    'Happy':'😊','Energized':'⚡','Calm':'😌','Affectionate':'🥰','Horny':'🔥',
    'Neutral':'😐','Tired':'😴','Foggy / Low focus':'🧠','Stressed':'😮‍💨',
    'Emotional':'😢','Irritable':'😠','Cramping':'🤕','Bloated':'🫠',
    'Headachey':'🤯','Breast Tenderness':'🎀','Lower Back Pain':'🔩','Nauseous':'🤢','Stomach Issues':'🫄'
  };

  const formatted = top.map(f => (FEELING_EMOJIS[f] || '') + ' ' + f).join(', ');

  return '<div style="margin-top:0.85rem;padding:0.75rem 1rem;background:var(--mist);border-radius:12px;border:1px solid var(--border)">'
    + '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-lt);margin-bottom:4px">You&#39;ve previously reported</div>'
    + '<div style="font-size:13px;color:var(--ink-mid);line-height:1.5">' + formatted + ' during this phase.</div>'
    + '</div>';
}


// ── CYCLE IRREGULARITY DETECTION ──
function getCycleIrregularity(periodDates) {
  if (periodDates.length < 4) return null; // need at least 3 cycles

  const lengths = [];
  for (let i = 1; i < periodDates.length; i++) {
    const diff = Math.floor((parseISOLocal(periodDates[i]) - parseISOLocal(periodDates[i-1])) / 86400000);
    if (diff > 14 && diff < 60) lengths.push(diff);
  }
  if (lengths.length < 3) return null;

  const avg = lengths.reduce((a,b) => a+b, 0) / lengths.length;
  const variance = lengths.reduce((sum, l) => sum + Math.pow(l - avg, 2), 0) / lengths.length;
  const stdDev = Math.sqrt(variance);
  const hasShort = lengths.some(l => l < 21);
  const hasLong  = lengths.some(l => l > 35);
  const isIrregular = stdDev > 7 || hasShort || hasLong;

  if (!isIrregular) return null;

  const reasons = [];
  if (hasShort) reasons.push('one or more cycles shorter than 21 days');
  if (hasLong)  reasons.push('one or more cycles longer than 35 days');
  if (stdDev > 7) reasons.push('high variation between cycles (' + Math.round(stdDev) + ' day standard deviation)');

  return { stdDev: Math.round(stdDev), hasShort, hasLong, reasons };
}

// ── MONTHLY SUMMARY ──
function buildMonthlySummary(periodDates, sexDates, signalDates, feelingsMap, len) {
  if (periodDates.length < 2) return '';

  // Check if we just started a new cycle. Compare last two period dates
  const lastISO = periodDates[periodDates.length - 1];
  const prevISO = periodDates[periodDates.length - 2];
  const storageKey = 'summarySeen_' + lastISO;
  if (localStorage.getItem(storageKey)) return '';

  // Only show if the last period was logged within the past 5 days
  // (meaning she actually just logged it, not a historical entry)
  const lastPeriodDate = parseISOLocal(lastISO);
  const daysSinceLogged = Math.floor((new Date() - lastPeriodDate) / 86400000);
  if (daysSinceLogged > 5) return '';

  // Calculate last cycle length
  const lastCycleLen = Math.floor(
    (parseISOLocal(lastISO) - parseISOLocal(prevISO)) / 86400000
  );
  if (lastCycleLen < 14 || lastCycleLen > 60) return '';

  // Count intimacy and signals in last cycle
  const cycleStart = parseISOLocal(prevISO);
  const cycleEnd   = parseISOLocal(lastISO);

  const intimacyCount = (sexDates || []).filter(d => {
    const dt = parseISOLocal(d);
    return dt && dt >= cycleStart && dt < cycleEnd;
  }).length;

  const signalCount = (signalDates || []).filter(d => {
    const dt = parseISOLocal(d);
    return dt && dt >= cycleStart && dt < cycleEnd;
  }).length;

  // Find most common feeling and best phase from feelingsMap
  const phaseCounts = {};
  const feelingCounts = {};
  for (const [dateStr, feelings] of Object.entries(feelingsMap || {})) {
    const d = parseISOLocal(dateStr);
    if (!d || d < cycleStart || d >= cycleEnd) continue;
    const daysSince = Math.floor((d - cycleStart) / 86400000);
    const cycleDay = ((daysSince % lastCycleLen) + lastCycleLen) % lastCycleLen + 1;
    const phase = getPhase(cycleDay, lastCycleLen);
    phaseCounts[phase.name] = (phaseCounts[phase.name] || 0) + 1;
    feelings.split(',').map(f => f.trim()).filter(Boolean).forEach(f => {
      feelingCounts[f] = (feelingCounts[f] || 0) + 1;
    });
  }

  const topPhase   = Object.entries(phaseCounts).sort((a,b) => b[1]-a[1])[0];
  const topFeelings = Object.entries(feelingCounts).sort((a,b) => b[1]-a[1]).slice(0,2).map(([f]) => f);

  const FEELING_EMOJIS = {
    'Happy':'😊','Energized':'⚡','Calm':'😌','Affectionate':'🥰','Horny':'🔥',
    'Neutral':'😐','Tired':'😴','Foggy / Low focus':'🧠','Stressed':'😮‍💨',
    'Emotional':'😢','Irritable':'😠','Cramping':'🤕','Bloated':'🫠',
    'Headachey':'🤯','Breast Tenderness':'🎀','Lower Back Pain':'🔩','Nauseous':'🤢','Stomach Issues':'🫄'
  };

  let summary = 'Your last cycle was <strong>' + lastCycleLen + ' days</strong>.';
  if (topPhase) summary += ' You logged the most feelings during your <strong>' + topPhase[0] + '</strong> phase.';
  if (topFeelings.length) summary += ' Most reported: ' + topFeelings.map(f => (FEELING_EMOJIS[f]||'') + ' ' + f).join(' and ') + '.';
  if (intimacyCount > 0) summary += ' You logged intimacy <strong>' + intimacyCount + ' time' + (intimacyCount !== 1 ? 's' : '') + '</strong>.';
  if (signalCount > 0) summary += ' You sent <strong>' + signalCount + ' signal' + (signalCount !== 1 ? 's' : '') + '</strong> to Dan.';

  return '<div class="insight-card" id="summary-card" style="border:1px solid var(--rose-lt);background:linear-gradient(135deg,#FEF0F4,#fff)">'
    + '<div class="insight-header">'
    + '<div class="insight-icon" style="background:#EBF6F1;font-size:1.2rem">🔄</div>'
    + '<div><div class="insight-title" style="color:var(--rose)">New cycle started</div>'
    + '<div class="insight-sub">Here&#39;s how last cycle went</div></div>'
    + '<button onclick="dismissSummary(\'' + lastISO + '\')" style="margin-left:auto;background:none;border:none;font-size:18px;color:var(--ink-lt);cursor:pointer;padding:0 4px">&times;</button>'
    + '</div>'
    + '<div class="insight-body">' + summary + '</div>'
    + '</div>';
}

function render(periodDates,signalDates,symptomDates,feelingsMap,sexDates,periodEndDates) {
  const today=new Date();
  const len=avgCycleLen(periodDates);
  const lastDate=parseISOLocal(periodDates[periodDates.length-1]);
  const rawDaysSince=Math.floor((today-lastDate)/86400000);
  // Cap at len, don't wrap into a new cycle until she logs a new period
  const dayInCycle=Math.min(rawDaysSince+1, len);
  const phase=getPhase(dayInCycle,len);
  const tip=getDayTip(phase);
  const onPeriod=phase.name==="Menstrual";
  // Only treat as confirmed period if she actually logged one recently
  const daysSinceLastLogged = Math.floor((new Date() - parseISOLocal(periodDates[periodDates.length-1])) / 86400000);
  const periodConfirmed = onPeriod && daysSinceLastLogged <= 6;
  // Determine header phase class, check fertile window separately
  const ovDay = Math.round(len * PHASES[2].maxPct);
  const isFertileWindow = !onPeriod && dayInCycle >= ovDay - 5 && dayInCycle < ovDay - 2;
  const phaseHeaderClass = isFertileWindow ? 'phase-fertile'
    : phase.name === 'Menstrual'   ? 'phase-menstrual'
    : phase.name === 'Follicular'  ? 'phase-follicular'
    : phase.name === 'Ovulation'   ? 'phase-ovulation'
    : phase.name === 'Luteal'      ? 'phase-luteal'
    : 'phase-lateluteal';

  const nextPeriodDay=Math.max(len-rawDaysSince, 0);

function tapDay(iso) {
  const d = parseISOLocal(iso);
  const dateStr = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  const { periodDates, signalDates, symptomDates, len } = appState;

  // Work out phase for this day
  const lastDate = parseISOLocal(periodDates[periodDates.length-1]);
  const daysSince = Math.floor((d - lastDate) / 86400000);
  const cycleDay = (((daysSince % len) + len) % len) + 1;
  const phase = getPhase(cycleDay, len);

  const hasSignal  = signalDates.includes(iso);
  const hasSymptom = symptomDates.includes(iso);
  const hasIntimacy = (appState.sexDates || []).includes(iso);
  const isToday    = iso === toISO(new Date());
  const isFuture   = d > new Date();

  let body = '';

  // Phase summary
  body += '<div style="background:' + phase.bg + ';border-radius:12px;padding:0.85rem 1rem;margin-bottom:10px">'
    + '<div style="font-size:13px;color:' + phase.color + ';line-height:1.5">' + phase.body + '</div></div>';

  // Signal indicator
  if (hasSignal) {
    body += '<div style="background:#F0E8F8;border-radius:12px;padding:0.75rem 1rem;margin-bottom:10px;font-size:13px;color:var(--plum)">💜 Signal sent to Dan on this day.</div>';
  }

  // Intimacy indicator
  if (hasIntimacy) {
    body += '<div style="background:#FFF0F6;border-radius:12px;padding:0.75rem 1rem;margin-bottom:10px;font-size:13px;color:#C45E8A">😏 Intimacy logged on this day.</div>';
  }

  // Symptom indicator, feelings pulled from sheet via appState.feelingsMap
  if (hasSymptom) {
    const feelings = (appState.feelingsMap && appState.feelingsMap[iso]) || '';
    body += '<div style="background:#EEF8F3;border-radius:12px;padding:0.75rem 1rem;margin-bottom:10px;font-size:13px;color:var(--sage)">'
      + '📝 Feelings logged' + (feelings ? ': <strong>' + feelings + '</strong>' : '') + '</div>';
  }

  // Actions
  body += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">';
  if (!isFuture) {
    body += '<button class="mbtn primary" onclick="closeModal();openLogForDate(\'' + iso + '\')">🩸 Log period start on this day</button>';
    body += '<button class="mbtn" onclick="closeModal();openSymptomForDate(\'' + iso + '\')" style="background:linear-gradient(135deg,#5FA67A,#3d8a5e);color:#fff">📝 Log feelings for this day</button>';
  }
  body += '<button class="mbtn cancel" onclick="closeModal()">Close</button>';
  body += '</div>';

  showModal(dateStr, phase.emoji + ' Day ' + cycleDay + ' of ' + len + ' | ' + phase.name, body);
}
function openLog() {
  const { periodDates, periodEndDates, periodConfirmed } = appState || {};
  // Detect if she is currently on her period (confirmed) and no end logged for this cycle yet
  const lastPeriodISO = periodDates && periodDates.length ? periodDates[periodDates.length-1] : null;
  const lastEndISO = periodEndDates && periodEndDates.length ? periodEndDates[periodEndDates.length-1] : null;
  const lastPeriodDate = lastPeriodISO ? parseISOLocal(lastPeriodISO) : null;
  const lastEndDate = lastEndISO ? parseISOLocal(lastEndISO) : null;
  const endAlreadyLogged = lastEndDate && lastPeriodDate && lastEndDate >= lastPeriodDate;
  const isLoggingEnd = periodConfirmed && !endAlreadyLogged;

  const today = new Date();
  const days = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
    const iso = toISO(d);
    const label = i === 0 ? 'Today' : i === 1 ? 'Yesterday' :
      d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
    days.push({ iso, label });
  }

  if (isLoggingEnd) {
    showModal('Log period end', 'When did it end?',
      days.map(d =>
        '<button class="mbtn" onclick="submitLog(\'periodend\',\''+d.iso+'\''+')" style="background:var(--mist);border:1px solid var(--border);color:var(--ink);text-align:left;padding:13px 16px;">'
        + d.label + '</button>'
      ).join('') + '<button class="mbtn cancel" onclick="closeModal()" style="margin-top:4px">Cancel</button>');
  } else {
    showModal('Log period start', 'When did it start?',
      days.map(d =>
        '<button class="mbtn" onclick="openLogForDate(\''+d.iso+'\''+')" style="background:var(--mist);border:1px solid var(--border);color:var(--ink);text-align:left;padding:13px 16px;">'
        + d.label + '</button>'
      ).join('') + '<button class="mbtn cancel" onclick="closeModal()" style="margin-top:4px">Cancel</button>');
  }
}

function openLogForDate(iso) {

  if(btns){btns.style.opacity='0.5';btns.style.pointerEvents='none';}
  modalMsg(action==='signal'?"Sending. He's going to love it! 💜":'Saving...');
  try {
    await writeEntry(action,iso);
    if(action==='periodend') {
      modalMsg('Period end logged.','ok');
      setTimeout(()=>{ closeModal(); init(); },1500);
    } else if(action==='signal') {
      modalMsg('Signal sent to Dan. 💜','ok');
      playSignalChime();
      setTimeout(()=>{ closeModal(); init(); },1500);
    } else {
      setTimeout(()=>{ closeModal(); init(); },1500);
    }
  } catch(e) {
    modalMsg('Could not save. Check your connection and try again.','err');
    if(btns){btns.style.opacity='1';btns.style.pointerEvents='auto';}
  }
}

function playSignalChime() {
  haptic('signal');
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99,1046.50].forEach((freq,i)=>{
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.12);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.12);
      gain.gain.linearRampToValueAtTime(0.18,ctx.currentTime+i*0.12+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.35);
      osc.start(ctx.currentTime+i*0.12);
      osc.stop(ctx.currentTime+i*0.12+0.35);
    });
  } catch(e) {}
}


// ── PUSH NOTIFICATIONS ──

async function scheduleOverdueReminders(daysOverdue) {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;

  const reg = await navigator.serviceWorker.ready;
  if (!reg.active) return;

  // Only schedule once per overdue day
  const key = 'overdueScheduled';
  const lastKey = localStorage.getItem(key);
  const thisKey = 'overdue-' + daysOverdue;
  if (lastKey === thisKey) return;
  localStorage.setItem(key, thisKey);

  // Schedule 8am reminders for each remaining day up to 7 days overdue
  const reminders = [];
  const now = new Date();
  for (let d = daysOverdue; d <= 7; d++) {
    const daysFromNow = d - daysOverdue;
    const fire = new Date(now.getFullYear(), now.getMonth(), now.getDate() + daysFromNow, 8, 0, 0, 0);
    if (fire.getTime() > Date.now()) {
      reminders.push({ fireAt: fire.getTime(), daysOverdue: d });
    }
  }
  if (reminders.length) {
    reg.active.postMessage({ type: 'SCHEDULE_OVERDUE_REMINDERS', reminders });
  }
}
async function registerServiceWorker() {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
  try {
    await navigator.serviceWorker.register('./sw.js');
    // Request notification permission on first visit
    if (Notification.permission === 'default') {
      await Notification.requestPermission();
    }
  } catch(e) { console.warn('SW registration failed:', e); }
}

async function schedulePeriodReminders(daysUntil) {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;

  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
  if (Notification.permission !== 'granted') return;

  const reg = await navigator.serviceWorker.ready;
  if (!reg.active) return;

  // Only schedule once, store the period start date we scheduled for
  const scheduleKey = 'remindersScheduled';
  const lastKey = localStorage.getItem(scheduleKey);
  const thisKey = String(daysUntil); // unique per countdown position
  if (lastKey === thisKey) return;
  localStorage.setItem(scheduleKey, thisKey);

  // Build one 8am notification for each remaining day
  // daysUntil=3 means today is 3 days out, so schedule day 3, 2, 1 and 0
  const reminders = [];
  const now = new Date();

  for (let d = daysUntil; d >= 0; d--) {
    const daysFromNow = daysUntil - d;
    const fire = new Date(now.getFullYear(), now.getMonth(), now.getDate() + daysFromNow, 8, 0, 0, 0);
    // Skip if already past 8am today for d===daysUntil
    if (fire.getTime() > Date.now()) {
      reminders.push({ fireAt: fire.getTime(), daysUntil: d });
    }
  }

  if (reminders.length) {
    reg.active.postMessage({ type: 'SCHEDULE_PERIOD_REMINDERS', reminders });
  }
}


// ── HAPTIC FEEDBACK ──
function haptic(style) {
  if (!navigator.vibrate) return;
  if (style === 'light')   navigator.vibrate(10);
  else if (style === 'medium') navigator.vibrate(25);
  else if (style === 'success') navigator.vibrate([15, 50, 15]);
  else if (style === 'signal') navigator.vibrate([10, 30, 10, 30, 20]);
  else navigator.vibrate(15);
}


// ── WEATHER ──
const OWM_KEY = 'db1fa67edb54206cc12ea2a3d7256b2e';

async function fetchWeather() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        try {
          const { latitude: lat, longitude: lon } = pos.coords;
          const url = 'https://api.openweathermap.org/data/2.5/weather?lat=' + lat + '&lon=' + lon + '&units=imperial&appid=' + OWM_KEY;
          const res = await fetch(url);
          const data = await res.json();
          if (data.cod && data.cod !== 200) { resolve(null); return; }
          resolve({
            temp:     Math.round(data.main.temp),
            feels:    Math.round(data.main.feels_like),
            humidity: data.main.humidity,
            desc:     data.weather[0].description,
            id:       data.weather[0].id,
            city:     data.name,
            wind:     Math.round(data.wind.speed)
          });
        } catch(e) { console.warn('Weather fetch error:', e); resolve(null); }
      },
      (err) => { console.warn('Geolocation error:', err); resolve(null); },
      { timeout: 10000 }
    );
  });
}

function getWeatherEmoji(id, temp) {
  if (id >= 200 && id < 300) return '⛈';
  if (id >= 300 && id < 400) return '🌦';
  if (id >= 500 && id < 600) return '🌧';
  if (id >= 600 && id < 700) return '❄️';
  if (id >= 700 && id < 800) return '🌫';
  if (id === 800) return temp > 85 ? '☀️' : temp < 40 ? '🌨' : '☀️';
  if (id === 801 || id === 802) return '⛅';
  return '🌥';
}

function getSeason() {
  const m = new Date().getMonth(); // 0-indexed
  if (m >= 2 && m <= 4) return 'spring';
  if (m >= 5 && m <= 7) return 'summer';
  if (m >= 8 && m <= 10) return 'autumn';
  return 'winter';
}

function buildWeatherCard(weather, phase) {
  if (!weather) return '';

  const season   = getSeason();
  const isHot    = weather.temp >= 82;
  const isCold   = weather.temp <= 40;
  const isHumid  = weather.humidity >= 65;
  const isWinter = season === 'winter';
  const isSummer = season === 'summer';
  const showContent = isHot || isCold || isHumid || isWinter || isSummer;
  const emoji    = getWeatherEmoji(weather.id, weather.temp);
  const p        = phase.name;

  const insights = [];
  const tips     = [];

  if (showContent) {
    // Hot + humid
    if (isHot && isHumid) {
      if (p === 'Menstrual' || p === 'Late Luteal') {
        insights.push('Heat and humidity combined with your ' + p + ' phase is a tough pairing. Vasopressin triggered by dehydration constricts blood vessels, which can significantly intensify cramping and bloating you may already be feeling.');
        tips.push('Drink 8–10 glasses of water today, dehydration directly worsens cramp intensity.');
        tips.push('Electrolytes (coconut water, pinch of sea salt) help your body retain the right fluid balance.');
      } else if (p === 'Ovulation') {
        insights.push("You're in your peak phase and today's heat and humidity could work against you. Dehydration reduces blood volume and can dull the natural energy boost ovulation brings.");
        tips.push('Stay well hydrated to keep your energy and mood at their natural peak today.');
        tips.push('Light, breathable clothing will help your body stay cool and your mood stay lifted.');
      } else if (p === 'Luteal') {
        insights.push("Your body is already prone to fluid retention in the Luteal phase. Today's humidity amplifies that sensation significantly. Bloating may feel more pronounced than usual.");
        tips.push('Reduce sodium intake today to minimize fluid retention.');
        tips.push('Cool, shaded environments and light movement will help more than staying still.');
      } else {
        insights.push("Today's heat and humidity increase dehydration risk. Even in your Follicular phase, staying hydrated protects the hormonal balance your body is building right now.");
        tips.push('Keep water within reach all day and aim for 8+ glasses.');
      }
    // Hot only
    } else if (isHot) {
      if (p === 'Menstrual') {
        insights.push("Heat dehydrates you faster during your period. Reduced blood volume from dehydration raises vasopressin, which can make cramps noticeably more intense.");
        tips.push('Prioritize water and cool environments today. A heating pad indoors is fine but avoid prolonged outdoor heat.');
      } else if (p === 'Ovulation') {
        insights.push("Today's heat could slightly dull your natural ovulation energy peak if you're not hydrated. Your body is doing a lot right now. Support it.");
        tips.push('Stay ahead of hydration. Even mild dehydration affects mood, energy and libido.');
      } else if (p === 'Late Luteal') {
        insights.push("Heat during PMS raises cortisol, which is already elevated in this phase. That combination can amplify irritability and emotional sensitivity.");
        tips.push('Cool, calm environments will help regulate your nervous system today.');
        tips.push('Avoid caffeine, it compounds the cortisol and heat effect on your mood.');
      } else {
        insights.push("Today's heat increases dehydration risk. Staying hydrated supports stable hormone levels throughout your cycle.");
        tips.push('Drink consistently through the day, don\'t wait until you feel thirsty.');
      }
    // Cold only
    } else if (isCold) {
      if (p === 'Ovulation' || p === 'Follicular') {
        insights.push("Cold acts as a physical stressor and raises cortisol, which can suppress the LH surge your body needs for ovulation. In your " + p + " phase, staying warm directly supports your cycle timing.");
        tips.push('Keep your core and lower abdomen warm, layers and a hot water bottle help reduce the cortisol stress response.');
        tips.push('Warm ginger or chamomile tea supports circulation and helps your body stay in a calm, regulated state.');
      } else if (p === 'Menstrual') {
        insights.push("Cold temperatures constrict blood vessels, which during your period can increase cramping. Your uterus is already contracting. Adding vasoconstriction from cold doesn't help.");
        tips.push('Stay warm today. A heating pad on your lower abdomen is especially beneficial right now.');
        tips.push('Warm soups and herbal teas are your best friends in cold weather during your period.');
      } else {
        insights.push("Prolonged cold triggers cortisol release as your body works to maintain temperature. This low-level stress can subtly affect hormone balance over time.");
        tips.push('Dress in warm layers and limit extended cold exposure when possible.');
      }
    // Humid only
    } else if (isHumid) {
      if (p === 'Luteal' || p === 'Late Luteal') {
        insights.push("Humidity interferes with your body's ability to cool itself through sweat, increasing systemic inflammation. Combined with your " + p + " phase, where fluid retention is already common, bloating may feel significantly more burdensome today.");
        tips.push('Reduce sodium intake today to minimize additional fluid retention.');
        tips.push('Light, breathable fabrics and a cool environment will help your body regulate better.');
      } else {
        insights.push("Today's humidity can increase the sensation of heaviness and inflammation. While less impactful outside of PMS phases, staying hydrated keeps your body managing it well.");
        tips.push('Hydration helps your body process excess fluid. Aim for consistent water intake today.');
      }
    }

    // Winter overlay, add only if not already showing cold tips
    if (isWinter && !isCold) {
      if (p === 'Luteal' || p === 'Late Luteal') {
        insights.push('Winter months reduce Vitamin D, which is essential for progesterone production. In your ' + p + ' phase, low Vitamin D can worsen mood swings, fatigue and PMS symptoms.');
      } else {
        insights.push('Reduced winter sunlight lowers Vitamin D, a key hormone for estrogen and progesterone production. This can slightly lengthen cycles or amplify emotional symptoms.');
      }
      tips.push('A daily Vitamin D supplement (1,000–2,000 IU) during winter months supports hormonal balance.');
      tips.push('Get outside for 15\u201320 minutes of natural light each day, even when it\'s overcast.');
    }

    // Summer overlay, mild summer days
    if (isSummer && !isHot) {
      tips.push('Even on milder summer days, heat builds gradually. Stay ahead of hydration throughout the day.');
    }
  }

  const insightHtml = insights.map(i =>
    '<div class="insight-body" style="margin-bottom:0.6rem">' + i + '</div>'
  ).join('');

  const tipsHtml = tips.map(t =>
    '<div class="weather-tip">💡 ' + t + '</div>'
  ).join('');

  return '<div class="weather-card">'
    + '<div class="weather-header">'
    + '<div>'
    + '<div style="font-size:1.6rem;font-family:\'DM Serif Display\',serif;color:var(--ink)">' + weather.temp + '°F</div>'
    + '<div style="font-size:13px;color:var(--ink-lt);margin-top:2px;text-transform:capitalize">' + weather.desc + ' · ' + weather.city + '</div>'
    + '<div style="font-size:12px;color:var(--ink-lt);margin-top:1px">Feels like ' + weather.feels + '°F · Humidity ' + weather.humidity + '%</div>'
    + '</div>'
    + '<div style="font-size:2.5rem">' + emoji + '</div>'
    + '</div>'
    + insightHtml
    + tipsHtml
    + '</div>';
}

async function init() {
  calOffset=0;
  closeModal();
  registerServiceWorker();
  document.getElementById('app').innerHTML='<div class="loading-wrap"><div class="spinner"></div>Loading your cycle data...</div>';
  const {periodDates,signalDates,symptomDates,feelingsMap,sexDates,periodEndDates}=await fetchData();
  render(periodDates,signalDates,symptomDates,feelingsMap,sexDates,periodEndDates);
  // Load weather after render so page isn't blocked
  fetchWeather().then(weather => {
    const card = document.getElementById('weatherCard');
    if (!card) return;
    const phase = appState ? getPhase((Math.floor((new Date()-parseISOLocal(appState.periodDates[appState.periodDates.length-1]))/86400000)%appState.len)+1, appState.len) : PHASES[3];
    card.innerHTML = weather ? buildWeatherCard(weather, phase) : '<div class="insight-card" style="text-align:center;color:var(--ink-lt);font-size:13px">Weather unavailable, location access needed.</div>';
  });
}
